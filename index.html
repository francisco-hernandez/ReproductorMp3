<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reproductor MP3</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container py-5 d-flex justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div
          class="card shadow-lg rounded-4 overflow-hidden border-0 bg-dark text-white"
        >
          <img
            src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400&auto=format&fit=crop"
            class="card-img-top object-fit-cover"
            alt="Portada del álbum de la canción"
            id="cover"
            style="height: 320px"
          />

          <div class="card-body p-4 text-center">
            <h4 class="card-title fw-bold mb-1" id="title">
              Nombre de la Canción
            </h4>
            <p class="card-text text-white-50 mb-4" id="artist">
              Nombre del Artista
            </p>

            <audio id="audio" src="TU_ARCHIVO_DE_AUDIO.mp3"></audio>

            <div
              class="d-flex justify-content-between text-white-50 small mb-2 fw-semibold"
            >
              <span id="currTime">0:00</span>
              <span id="durTime">0:00</span>
            </div>

            <input
              type="range"
              class="form-range custom-range mb-4"
              id="progress"
              value="0"
              step="1"
              min="0"
              max="100"
              aria-label="Progreso de la canción"
            />

            <div class="d-flex justify-content-center align-items-center gap-4">
              <button
                class="btn btn-link text-white p-0 fs-2"
                id="prev"
                aria-label="Canción anterior"
              >
                <i class="bi bi-skip-backward-fill" aria-hidden="true"></i>
              </button>

              <button
                class="btn btn-primary rounded-circle p-3 d-flex align-items-center justify-content-center shadow transition-transform"
                id="play"
                aria-label="Reproducir o pausar"
                style="width: 65px; height: 65px"
              >
                <i class="bi bi-play-fill fs-1" id="playIcon" aria-hidden="true"></i>
              </button>

              <button
                class="btn btn-link text-white p-0 fs-2"
                id="next"
                aria-label="Siguiente canción"
              >
                <i class="bi bi-skip-forward-fill" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
